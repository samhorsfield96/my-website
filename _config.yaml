# site properties and page defaults
title: Dr. Samuel T. Horsfield
subtitle: SNSF Postdoctoral Fellow
description: I am a postdoctoral researcher in the Laboratory of Evolutionary Genetics at the University of Neuchâtel, Switzerland. I develop bioinformatics tools and models to study the evolutionary forces shaping the pangenomes of prokaryotes and eukaryotes.
header: images/DNA_background2.jpg
footer: images/DNA_background1.jpg
proofer: false

# site social media and other links
links:
  email: samuel.horsfield@unine.ch
  orcid: 0000-0002-3859-4073
  google-scholar: 4JrVLmcAAAAJ
  github: samhorsfield96
  bluesky: samuelhorsfield.bsky.social

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff

# configure jekyll spaceship
jekyll-spaceship:
  mathjax-processor:
    src:
      - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js
